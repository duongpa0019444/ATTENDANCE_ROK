version: '3.8'

services:
  # ── Infrastructure ─────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: attendance_postgres
    environment:
      POSTGRES_PASSWORD: password
      POSTGRES_DB: attendance_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - internal

  redis:
    image: redis:7-alpine
    container_name: attendance_redis
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - internal

  # ── Application services ───────────────────────────────────
  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: attendance_backend
    env_file:
      - .env
    environment:
      DATABASE_URL: "postgresql://postgres:password@postgres:5432/attendance_db?schema=public"
      REDIS_HOST: redis
      REDIS_PORT: 6379
      PORT: 3002
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
    networks:
      - internal

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    container_name: attendance_frontend
    environment:
      NEXT_PUBLIC_API_URL: "https://attendance.shinigami.io.vn/api"
      NEXT_PUBLIC_SOCKET_URL: "https://attendance.shinigami.io.vn"
      PORT: 3000
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - internal

  # ── Nginx Reverse Proxy ────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: attendance_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - certbot_webroot:/var/www/certbot:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    networks:
      - internal

volumes:
  postgres_data:
  redis_data:
  certbot_webroot:

networks:
  internal:
    driver: bridge
