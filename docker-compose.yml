version: '3.8'

services:
  # ── Infrastructure ─────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: attendance_postgres
    environment:
      POSTGRES_PASSWORD: password
      POSTGRES_DB: attendance_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - internal

  redis:
    image: redis:7-alpine
    container_name: attendance_redis
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - internal

  # ── Application services ───────────────────────────────────
  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: attendance_backend
    env_file:
      - .env
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      PORT: 3002
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - postgres
      - redis
    ports:
      - "127.0.0.1:3002:3002"
    restart: unless-stopped
    networks:
      - internal

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    container_name: attendance_frontend
    environment:
      NEXT_PUBLIC_API_URL: "https://attendance.shinigami.io.vn/api"
      NEXT_PUBLIC_SOCKET_URL: "https://attendance.shinigami.io.vn"
      PORT: 3000
    depends_on:
      - backend
    ports:
      - "127.0.0.1:3000:3000"
    restart: unless-stopped
    networks:
      - internal

volumes:
  postgres_data:
  redis_data:

networks:
  internal:
    driver: bridge
