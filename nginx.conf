# =============================================================
# Nginx Reverse Proxy Configuration for Attendance Platform
# =============================================================
# Services:
#   - Frontend  (Next.js)  : container port 3000  -> /
#   - Backend   (NestJS)   : container port 3002  -> /api, /socket.io
#
# HOW TO USE:
#   1. Replace YOUR_DOMAIN.COM with your actual domain name (both occurrences)
#   2. Obtain SSL certificates (e.g. via Certbot / Let's Encrypt):
#        certbot certonly --standalone -d YOUR_DOMAIN.COM
#   3. Mount this file into the nginx container:
#        volumes:
#          - ./nginx.conf:/etc/nginx/nginx.conf:ro
#          - /etc/letsencrypt:/etc/letsencrypt:ro
# =============================================================

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ───────────────────────────────────────────────
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent"';
    access_log  /var/log/nginx/access.log  main;
    error_log   /var/log/nginx/error.log   warn;

    # ── Performance ───────────────────────────────────────────
    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   65;
    client_max_body_size 10M;

    # ── Gzip Compression ─────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_types        text/plain text/css text/xml text/javascript
                      application/json application/javascript application/xml+rss
                      application/atom+xml image/svg+xml;

    # ── Upstreams ─────────────────────────────────────────────
    upstream frontend {
        server frontend:3000;
        keepalive 32;
    }

    upstream backend {
        server backend:3002;
        keepalive 32;
    }

    # ── HTTP → HTTPS redirect ─────────────────────────────────
    server {
        listen 80;
        server_name YOUR_DOMAIN.COM;

        # Allow Let's Encrypt ACME challenge to pass through
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS main server ─────────────────────────────────────
    server {
        listen 443 ssl;
        http2  on;
        server_name YOUR_DOMAIN.COM;

        # SSL Certificates (Let's Encrypt / Certbot)
        ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN.COM/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN.COM/privkey.pem;

        # Modern SSL settings
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # Security headers
        add_header X-Frame-Options        "SAMEORIGIN"   always;
        add_header X-Content-Type-Options "nosniff"      always;
        add_header X-XSS-Protection       "1; mode=block" always;
        add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

        # ── WebSocket / Socket.io ─────────────────────────────
        location /socket.io/ {
            proxy_pass http://backend;

            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_read_timeout  3600s;
            proxy_send_timeout  3600s;
        }

        # ── REST API ──────────────────────────────────────────
        # Frontend calls /api/... → Nginx strips /api → Backend receives /...
        location /api/ {
            rewrite ^/api/(.*) /$1 break;
            proxy_pass http://backend;

            proxy_http_version 1.1;
            proxy_set_header Connection "";

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 30s;
            proxy_read_timeout    60s;
        }

        # ── Next.js Frontend ──────────────────────────────────
        location / {
            proxy_pass http://frontend;

            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
